<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Grade 11 Unit 1 Exercise 9 Option C</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial;background:linear-gradient(135deg,#e9fff2,#eaf5ff);color:#18344e;min-height:100vh;padding:18px}.app{max-width:900px;margin:auto;background:#ffffffdd;border-radius:24px;overflow:hidden;box-shadow:0 18px 45px #24536d25}header{background:linear-gradient(135deg,#1ca466,#2f7fd6);color:white;padding:24px}h1{margin:0}.sub{margin-top:7px;opacity:.9}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px}.stat{background:white;border:1px solid #d9e8ee;border-radius:15px;padding:12px;text-align:center;font-weight:bold}.bar{height:12px;background:#dcebed;margin:0 16px;border-radius:9px;overflow:hidden}#fill{height:100%;width:0;background:linear-gradient(90deg,#21a366,#2e7edb);transition:.3s}main{padding:20px}.card,#result,#over{background:white;border:1px solid #d9e8ee;border-radius:20px;padding:22px}#q{line-height:1.75;font-size:18px;font-weight:600}.opt{display:block;width:100%;text-align:left;margin:10px 0;padding:14px;border:2px solid #dce8ee;border-radius:14px;background:#fbfdff;font-size:16px;cursor:pointer}.correct{background:#e9faef;border-color:#21a366;color:#125b38}.wrong{background:#fff0f3;border-color:#e94f64;color:#97263b}#fb{display:none;margin-top:15px;padding:14px;border-radius:12px;line-height:1.5}.good{display:block!important;background:#e9faef;border-left:5px solid #21a366}.bad{display:block!important;background:#fff0f3;border-left:5px solid #e94f64}#next,.restart{display:none;margin-top:15px;border:0;border-radius:12px;padding:12px 20px;background:linear-gradient(135deg,#21a366,#2e7edb);color:white;font-weight:bold;cursor:pointer}.show{display:inline-block!important}#result,#over{display:none;text-align:center}.confetti{position:fixed;top:-20px;width:9px;height:15px;animation:fall linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(700deg)}}@media(max-width:650px){.stats{grid-template-columns:repeat(2,1fr)}body{padding:8px}main{padding:14px}}</style></head><body><div class='app'><header><h1>🌿 Healthy Living Master Challenge</h1><div class='sub'>Grade 11 • Unit 1 • Exercise 9 • Option C</div></header><div class='stats'><div class='stat'>XP<br><span id='xp'>0</span></div><div class='stat'>Coins<br><span id='coins'>0</span> 🪙</div><div class='stat'>Combo<br><span id='combo'>0</span>×</div><div class='stat'>Hearts<br><span id='hearts'>❤️❤️❤️</span></div></div><div class='bar'><div id='fill'></div></div><main><section class='card' id='card'><h3 id='num'></h3><div id='q'></div><div id='opts'></div><div id='fb'></div><button id='next'>Next ➜</button></section><section id='over'><h2>💔 Game Over</h2><p>You have run out of hearts.</p><button class='restart show' onclick='reset()'>Restart</button></section><section id='result'><h2>🎉 Mission Complete!</h2><h1 id='score'></h1><p id='msg'></p><p><b id='fxp'></b> XP • <b id='fcoins'></b> Coins • Best combo: <b id='best'></b>×</p><button class='restart show' onclick='reset()'>Play Again</button></section></main></div><script>
const data=[{"q": "Living a healthy lifestyle has become an important goal for many people around the world. (1) ____________. More individuals are paying attention to their eating habits, physical activity, and mental well-being.", "o": ["More schools and workplaces are encouraging healthier habits through education and wellness programs.", "Eating unhealthy snacks has become the only concern of health experts.", "Few people believe that regular exercise has any positive effects.", "Medical treatment is considered more important than preventing diseases."], "a": 0, "e": "Câu A phát triển ý ‘healthy lifestyle’ và dẫn đến câu sau nói nhiều người quan tâm hơn đến sức khỏe."}, {"q": "Modern technology has also changed the way people manage their health. Mobile applications can remind users to drink water, track physical activity, and record sleeping patterns, (2) ____________.", "o": ["where healthier habits are ignored by many users", "which encourage people to make smarter decisions about their daily routines", "in which people have encouraged healthier decisions every day", "encouraging by healthier lifestyle decisions"], "a": 1, "e": "Mệnh đề quan hệ ‘which’ bổ nghĩa cho ‘Mobile applications’, diễn tả chức năng của các ứng dụng."}, {"q": "Known for their convenience and accessibility, (3) ____________. Nevertheless, experts emphasize that technology alone cannot guarantee success.", "o": ["many people believe that health apps are too complicated to understand", "regular exercise has become impossible for busy office workers", "these digital tools help users build healthier routines through daily guidance", "hospitals no longer provide health advice to patients"], "a": 2, "e": "Cụm phân từ ‘Known for...’ phải bổ nghĩa cho chủ ngữ ngay sau nó là ‘these digital tools’."}, {"q": "Healthy habits still require determination, consistency, and personal responsibility. (4) ____________. These efforts include improving health education, encouraging regular exercise, and providing healthier food choices in schools and workplaces.", "o": ["As a result, unhealthy habits are becoming more common among teenagers.", "Therefore, families, schools, and governments are working together to promote healthier lifestyles.", "In contrast, most doctors discourage people from exercising regularly.", "Although many people exercise regularly, unhealthy food is becoming more popular."], "a": 1, "e": "‘These efforts’ ở câu sau chỉ những nỗ lực của gia đình, nhà trường và chính phủ được nhắc đến trong câu B."}, {"q": "The increasing popularity of these initiatives (5) ____________ and encourages people to adopt healthier lifestyles.", "o": ["reflects a growing awareness of the importance of long-term well-being", "reflecting people become healthier every day", "is reflected people choosing unhealthy lifestyles", "which reflecting greater concern about public health"], "a": 0, "e": "Chủ ngữ số ít ‘The increasing popularity’ đi với động từ ‘reflects’; câu A tạo cấu trúc hoàn chỉnh và đúng ngữ pháp."}];
let i=0,score=0,xp=0,coins=0,combo=0,best=0,hearts=3,locked=false;const $=x=>document.getElementById(x);
function stats(){$('xp').textContent=xp;$('coins').textContent=coins;$('combo').textContent=combo;$('hearts').textContent='❤️'.repeat(hearts)+'🖤'.repeat(3-hearts);$('fill').style.width=i/data.length*100+'%'}
function render(){locked=false;let x=data[i];$('num').textContent=`Question ${i+1} of ${data.length}`;$('q').textContent=x.q;$('opts').innerHTML='';$('fb').className='';$('fb').style.display='none';$('next').className='';x.o.forEach((t,n)=>{let b=document.createElement('button');b.className='opt';b.innerHTML=`<b>${String.fromCharCode(65+n)}.</b> ${t}`;b.onclick=()=>choose(n,b);$('opts').appendChild(b)});stats()}
function choose(n,b){if(locked)return;locked=true;let x=data[i],bs=[...document.querySelectorAll('.opt')];bs.forEach(z=>z.disabled=true);bs[x.a].classList.add('correct');if(n===x.a){score++;combo++;best=Math.max(best,combo);xp+=combo>=3?30:20;coins+=5+combo;$('fb').className='good';$('fb').innerHTML='✅ Correct!<br>'+x.e}else{b.classList.add('wrong');hearts--;combo=0;$('fb').className='bad';$('fb').innerHTML=`❌ Correct answer: <b>${String.fromCharCode(65+x.a)}</b><br>${x.e}`}$('fb').style.display='block';stats();if(hearts===0&&i<data.length-1)setTimeout(over,500);else{$('next').className='show';$('next').textContent=i===data.length-1?'See Results 🎉':'Next ➜'}}
$('next').onclick=()=>{i++;i>=data.length?finish():render()};
function over(){$('card').style.display='none';$('over').className='show'}
function finish(){$('card').style.display='none';$('result').className='show';$('fill').style.width='100%';$('score').textContent=`${score}/${data.length}`;$('fxp').textContent=xp;$('fcoins').textContent=coins;$('best').textContent=best;$('msg').textContent=score===5?'Perfect score!':score>=4?'Excellent work!':'Review the explanations and try again.';confetti()}
function reset(){i=score=xp=coins=combo=best=0;hearts=3;$('result').className='';$('over').className='';$('card').style.display='block';render()}
function confetti(){for(let k=0;k<70;k++){let c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=`hsl(${Math.random()*360},80%,60%)`;c.style.animationDuration=2.5+Math.random()*2+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),5000)}}
render();
</script></body></html>
