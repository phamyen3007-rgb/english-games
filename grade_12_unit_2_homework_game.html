<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grade 12 Homework – Unit 2</title>
  <style>
    :root{
      --bg1:#e8f7ff;
      --bg2:#e9fff6;
      --card:#ffffff;
      --primary:#0f766e;
      --primary2:#2563eb;
      --text:#16324f;
      --muted:#64748b;
      --correct:#16a34a;
      --wrong:#dc2626;
      --border:#dbeafe;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      min-height:100vh;
      padding:24px;
    }
    .app{
      max-width:820px;
      margin:0 auto;
    }
    .header{
      text-align:center;
      margin-bottom:18px;
    }
    .header h1{
      margin:0 0 8px;
      font-size:clamp(26px,4vw,40px);
    }
    .header p{
      margin:0;
      color:var(--muted);
      font-size:16px;
    }
    .topbar{
      display:grid;
      grid-template-columns:1fr auto;
      gap:14px;
      align-items:center;
      background:rgba(255,255,255,.75);
      padding:14px 16px;
      border-radius:18px;
      margin:18px 0;
      border:1px solid rgba(255,255,255,.9);
    }
    .progress-wrap{
      width:100%;
      height:12px;
      background:#dbeafe;
      border-radius:999px;
      overflow:hidden;
    }
    .progress{
      height:100%;
      width:0;
      background:linear-gradient(90deg,var(--primary),var(--primary2));
      transition:width .35s ease;
    }
    .score{
      font-weight:700;
      white-space:nowrap;
    }
    .card{
      background:var(--card);
      border-radius:24px;
      padding:28px;
      box-shadow:0 14px 40px rgba(15,118,110,.12);
      border:1px solid var(--border);
      animation:fade .35s ease;
    }
    @keyframes fade{
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:translateY(0)}
    }
    .qnum{
      color:var(--primary);
      font-weight:800;
      margin-bottom:12px;
    }
    .question{
      font-size:22px;
      line-height:1.5;
      margin:0 0 20px;
      font-weight:700;
    }
    .options{
      display:grid;
      gap:12px;
    }
    .option{
      width:100%;
      border:2px solid #dbeafe;
      background:#f8fbff;
      border-radius:16px;
      padding:15px 16px;
      text-align:left;
      font-size:17px;
      cursor:pointer;
      transition:.2s;
      color:var(--text);
    }
    .option:hover:not(:disabled){
      border-color:#60a5fa;
      transform:translateY(-1px);
    }
    .option:disabled{cursor:not-allowed}
    .option.correct{
      border-color:var(--correct);
      background:#ecfdf3;
      color:#166534;
      font-weight:700;
    }
    .option.wrong{
      border-color:var(--wrong);
      background:#fef2f2;
      color:#991b1b;
      font-weight:700;
    }
    .feedback{
      display:none;
      margin-top:20px;
      border-radius:16px;
      padding:16px;
      line-height:1.5;
      font-size:16px;
    }
    .feedback.show{display:block}
    .feedback.good{
      background:#ecfdf3;
      border:1px solid #86efac;
      color:#166534;
    }
    .feedback.bad{
      background:#fff7ed;
      border:1px solid #fdba74;
      color:#9a3412;
    }
    .next{
      display:none;
      margin-top:18px;
      margin-left:auto;
      border:0;
      border-radius:14px;
      background:linear-gradient(90deg,var(--primary),var(--primary2));
      color:white;
      font-size:16px;
      font-weight:700;
      padding:13px 22px;
      cursor:pointer;
    }
    .next.show{display:block}
    .result{
      text-align:center;
      padding:20px 8px;
    }
    .result .big{
      font-size:64px;
      font-weight:900;
      color:var(--primary);
      margin:10px 0;
    }
    .restart{
      border:0;
      border-radius:14px;
      background:linear-gradient(90deg,var(--primary),var(--primary2));
      color:white;
      font-size:17px;
      font-weight:700;
      padding:14px 24px;
      cursor:pointer;
      margin-top:10px;
    }
    @media (max-width:600px){
      body{padding:14px}
      .card{padding:20px}
      .question{font-size:19px}
      .option{font-size:16px}
      .topbar{grid-template-columns:1fr}
      .score{text-align:right}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1>Grade 12 Homework</h1>
      <p>Unit 2: A Multicultural World</p>
    </section>

    <section class="topbar">
      <div class="progress-wrap" aria-label="Quiz progress">
        <div class="progress" id="progress"></div>
      </div>
      <div class="score" id="score">Score: 0/10</div>
    </section>

    <section class="card" id="quizCard">
      <div class="qnum" id="qnum"></div>
      <h2 class="question" id="question"></h2>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next" id="nextBtn">Next Question</button>
    </section>
  </main>

  <script>
    const quizData = [
      {
        q: "The annual cultural festival gives visitors a chance to experience traditional __________ from many different regions.",
        options: ["identities", "customs", "barriers", "recipes"],
        answer: 1,
        explain: "Customs = phong tục. Cụm “traditional customs” phù hợp với nghĩa của câu."
      },
      {
        q: "Many foreign tourists are impressed by Vietnamese __________ such as pho, banh mi, and fresh spring rolls.",
        options: ["cuisines", "customs", "specialties", "ingredients"],
        answer: 2,
        explain: "Specialties = đặc sản. Phở, bánh mì và gỏi cuốn là các món đặc sản Việt Nam."
      },
      {
        q: "__________ another culture with an open mind helps people avoid misunderstandings while travelling.",
        options: ["Appreciating", "Appreciate", "Appreciated", "To appreciating"],
        answer: 0,
        explain: "V-ing đứng đầu câu làm chủ ngữ: “Appreciating another culture...”"
      },
      {
        q: "The dance performance was so __________ that the audience gave the performers a standing ovation.",
        options: ["captivate", "captivating", "captivated", "captivation"],
        answer: 1,
        explain: "Captivating = hấp dẫn, cuốn hút; dùng để miêu tả màn trình diễn."
      },
      {
        q: "Many students experience __________ when they first study in a foreign country.",
        options: ["globalization", "culture shock", "cultural identity", "traditional cuisine"],
        answer: 1,
        explain: "Culture shock = sốc văn hóa, thường xảy ra khi sống hoặc học tập ở nước ngoài."
      },
      {
        q: "The exhibition featured handicrafts __________ by local artists from different ethnic groups.",
        options: ["making", "made", "make", "to make"],
        answer: 1,
        explain: "Made là quá khứ phân từ, rút gọn từ “which were made by local artists”."
      },
      {
        q: "Learning about other cultures helps us become more __________ of cultural differences.",
        options: ["appreciate", "appreciation", "appreciative", "appreciatively"],
        answer: 2,
        explain: "Sau “become more” cần tính từ: appreciative of = biết trân trọng."
      },
      {
        q: "Traditional festivals play an important role in preserving a country's cultural __________.",
        options: ["identity", "ingredient", "booth", "souvenir"],
        answer: 0,
        explain: "Cultural identity = bản sắc văn hóa."
      },
      {
        q: "Thanks to __________, people can easily learn about customs and traditions from around the world.",
        options: ["confusion", "globalization", "restriction", "unfamiliarity"],
        answer: 1,
        explain: "Globalization = toàn cầu hóa, giúp con người tiếp cận các nền văn hóa khác dễ dàng hơn."
      },
      {
        q: "Visitors should respect local __________ and behave politely when attending traditional ceremonies.",
        options: ["recipes", "customs", "cuisines", "ingredients"],
        answer: 1,
        explain: "Respect local customs = tôn trọng phong tục địa phương."
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    const qnum = document.getElementById("qnum");
    const question = document.getElementById("question");
    const options = document.getElementById("options");
    const feedback = document.getElementById("feedback");
    const nextBtn = document.getElementById("nextBtn");
    const progress = document.getElementById("progress");
    const scoreEl = document.getElementById("score");
    const quizCard = document.getElementById("quizCard");

    function renderQuestion(){
      answered = false;
      const item = quizData[current];
      qnum.textContent = `Question ${current + 1} of ${quizData.length}`;
      question.textContent = item.q;
      options.innerHTML = "";
      feedback.className = "feedback";
      feedback.textContent = "";
      nextBtn.className = "next";
      nextBtn.textContent = current === quizData.length - 1 ? "View Result" : "Next Question";
      progress.style.width = `${(current / quizData.length) * 100}%`;
      scoreEl.textContent = `Score: ${score}/${quizData.length}`;

      item.options.forEach((text, index) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.type = "button";
        btn.innerHTML = `<strong>${String.fromCharCode(65 + index)}.</strong> ${text}`;
        btn.addEventListener("click", () => selectAnswer(index));
        options.appendChild(btn);
      });
    }

    function selectAnswer(index){
      if(answered) return;
      answered = true;

      const item = quizData[current];
      const buttons = [...document.querySelectorAll(".option")];

      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if(i === item.answer) btn.classList.add("correct");
      });

      if(index === item.answer){
        score++;
        buttons[index].classList.add("correct");
        feedback.className = "feedback show good";
        feedback.innerHTML = `<strong>Correct!</strong><br>${item.explain}`;
      } else {
        buttons[index].classList.add("wrong");
        feedback.className = "feedback show bad";
        feedback.innerHTML = `<strong>Not quite.</strong><br>Correct answer: <strong>${String.fromCharCode(65 + item.answer)}. ${item.options[item.answer]}</strong><br>${item.explain}`;
      }

      scoreEl.textContent = `Score: ${score}/${quizData.length}`;
      progress.style.width = `${((current + 1) / quizData.length) * 100}%`;
      nextBtn.className = "next show";
    }

    function showResult(){
      let message = "";
      if(score === 10) message = "Excellent! Perfect score!";
      else if(score >= 8) message = "Great job! You have mastered the lesson.";
      else if(score >= 6) message = "Good effort! Review the explanations once more.";
      else message = "Keep practising. You can improve quickly!";

      quizCard.innerHTML = `
        <div class="result">
          <div class="qnum">Homework Completed</div>
          <h2>Your Final Score</h2>
          <div class="big">${score}/10</div>
          <p>${message}</p>
          <button class="restart" id="restartBtn">Play Again</button>
        </div>
      `;

      document.getElementById("restartBtn").addEventListener("click", () => {
        current = 0;
        score = 0;
        location.reload();
      });
    }

    nextBtn.addEventListener("click", () => {
      if(!answered) return;
      if(current < quizData.length - 1){
        current++;
        renderQuestion();
      } else {
        showResult();
      }
    });

    renderQuestion();
  </script>
</body>
</html>
