<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Grade 11 Unit 1 Exercise 9 Option B</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial;background:linear-gradient(135deg,#e9fff2,#eaf5ff);color:#18344e;min-height:100vh;padding:18px}.app{max-width:900px;margin:auto;background:#ffffffdd;border-radius:24px;overflow:hidden;box-shadow:0 18px 45px #24536d25}header{background:linear-gradient(135deg,#1ca466,#2f7fd6);color:white;padding:24px}h1{margin:0}.sub{margin-top:7px;opacity:.9}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px}.stat{background:white;border:1px solid #d9e8ee;border-radius:15px;padding:12px;text-align:center;font-weight:bold}.bar{height:12px;background:#dcebed;margin:0 16px;border-radius:9px;overflow:hidden}#fill{height:100%;width:0;background:linear-gradient(90deg,#21a366,#2e7edb);transition:.3s}main{padding:20px}.card,#result,#over{background:white;border:1px solid #d9e8ee;border-radius:20px;padding:22px}#q{line-height:1.75;font-size:18px;font-weight:600}.opt{display:block;width:100%;text-align:left;margin:10px 0;padding:14px;border:2px solid #dce8ee;border-radius:14px;background:#fbfdff;font-size:16px;cursor:pointer}.correct{background:#e9faef;border-color:#21a366;color:#125b38}.wrong{background:#fff0f3;border-color:#e94f64;color:#97263b}#fb{display:none;margin-top:15px;padding:14px;border-radius:12px;line-height:1.5}.good{display:block!important;background:#e9faef;border-left:5px solid #21a366}.bad{display:block!important;background:#fff0f3;border-left:5px solid #e94f64}#next,.restart{display:none;margin-top:15px;border:0;border-radius:12px;padding:12px 20px;background:linear-gradient(135deg,#21a366,#2e7edb);color:white;font-weight:bold;cursor:pointer}.show{display:inline-block!important}#result,#over{display:none;text-align:center}.confetti{position:fixed;top:-20px;width:9px;height:15px;animation:fall linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(700deg)}}@media(max-width:650px){.stats{grid-template-columns:repeat(2,1fr)}body{padding:8px}main{padding:14px}}</style></head><body><div class='app'><header><h1>🌿 Healthy Lifestyle Challenge</h1><div class='sub'>Grade 11 • Unit 1 • Exercise 9 • Option B</div></header><div class='stats'><div class='stat'>XP<br><span id='xp'>0</span></div><div class='stat'>Coins<br><span id='coins'>0</span> 🪙</div><div class='stat'>Combo<br><span id='combo'>0</span>×</div><div class='stat'>Hearts<br><span id='hearts'>❤️❤️❤️</span></div></div><div class='bar'><div id='fill'></div></div><main><section class='card' id='card'><h3 id='num'></h3><div id='q'></div><div id='opts'></div><div id='fb'></div><button id='next'>Next ➜</button></section><section id='over'><h2>💔 Game Over</h2><p>You have run out of hearts.</p><button class='restart show' onclick='reset()'>Restart</button></section><section id='result'><h2>🎉 Mission Complete!</h2><h1 id='score'></h1><p id='msg'></p><p><b id='fxp'></b> XP • <b id='fcoins'></b> Coins • Best combo: <b id='best'></b>×</p><button class='restart show' onclick='reset()'>Play Again</button></section></main></div><script>
const data=[
{q:"Living a healthy lifestyle has become more important in recent years. (1) ____________. People are becoming more interested in eating healthy food, exercising regularly, and taking better care of their mental health.",o:["More people now understand that healthy habits can improve their quality of life.","Unhealthy food is the only cause of poor health.","Most people think exercise is a waste of time.","Doctors rarely encourage healthy lifestyles."],a:0,e:"Câu A giải thích nguyên nhân của xu hướng được nêu ở câu đầu và dẫn tự nhiên đến câu sau."},
{q:"Many mobile applications can remind users to drink enough water, count their daily steps, and monitor their sleeping habits, (2) ____________.",o:["where people spend less time exercising","which helps them develop healthier daily routines","although smartphones are becoming more expensive","because healthy food is difficult to find"],a:1,e:"“Which” tạo mệnh đề quan hệ không xác định, bổ sung kết quả của toàn bộ mệnh đề phía trước."},
{q:"Used by millions of people around the world, (3) ____________. However, experts believe that technology should only be seen as a useful support.",o:["these digital tools encourage users to build healthier habits","many students dislike using health applications","hospitals are becoming more crowded every year","unhealthy food is cheaper than healthy food"],a:0,e:"Cụm phân từ “Used by...” phải bổ nghĩa cho chủ ngữ theo sau là “these digital tools”."},
{q:"Healthy living also depends on people's own choices. (4) ____________. This includes eating balanced meals, exercising regularly, and getting enough sleep every night.",o:["Technology has completely replaced healthy habits.","Everyone should develop good daily habits.","Doctors work longer hours than before.","Many people enjoy playing online games."],a:1,e:"“This includes...” tham chiếu đến “good daily habits” ở câu trước."},
{q:"The growing popularity of healthy lifestyle campaigns (5) ____________ and encourages more people to make positive changes.",o:["reflect the importance of regular exercise","are showing that everyone is becoming healthier","shows that people are paying more attention to their well-being","showing people how to stay healthy"],a:2,e:"Chủ ngữ chính là “The growing popularity” (số ít), nên động từ đúng là “shows”."}
];
let i=0,score=0,xp=0,coins=0,combo=0,best=0,hearts=3,locked=false;const $=x=>document.getElementById(x);
function stats(){$('xp').textContent=xp;$('coins').textContent=coins;$('combo').textContent=combo;$('hearts').textContent='❤️'.repeat(hearts)+'🖤'.repeat(3-hearts);$('fill').style.width=i/data.length*100+'%'}
function render(){locked=false;let x=data[i];$('num').textContent=`Question ${i+1} of ${data.length}`;$('q').textContent=x.q;$('opts').innerHTML='';$('fb').className='';$('fb').style.display='none';$('next').className='';x.o.forEach((t,n)=>{let b=document.createElement('button');b.className='opt';b.innerHTML=`<b>${String.fromCharCode(65+n)}.</b> ${t}`;b.onclick=()=>choose(n,b);$('opts').appendChild(b)});stats()}
function choose(n,b){if(locked)return;locked=true;let x=data[i],bs=[...document.querySelectorAll('.opt')];bs.forEach(z=>z.disabled=true);bs[x.a].classList.add('correct');if(n===x.a){score++;combo++;best=Math.max(best,combo);xp+=combo>=3?30:20;coins+=5+combo;$('fb').className='good';$('fb').innerHTML='✅ Correct!<br>'+x.e}else{b.classList.add('wrong');hearts--;combo=0;$('fb').className='bad';$('fb').innerHTML=`❌ Correct answer: <b>${String.fromCharCode(65+x.a)}</b><br>${x.e}`}$('fb').style.display='block';stats();if(hearts===0&&i<data.length-1)setTimeout(over,500);else{$('next').className='show';$('next').textContent=i===data.length-1?'See Results 🎉':'Next ➜'}}
$('next').onclick=()=>{i++;i>=data.length?finish():render()};
function over(){$('card').style.display='none';$('over').className='show'}
function finish(){$('card').style.display='none';$('result').className='show';$('fill').style.width='100%';$('score').textContent=`${score}/${data.length}`;$('fxp').textContent=xp;$('fcoins').textContent=coins;$('best').textContent=best;$('msg').textContent=score===5?'Perfect score!':score>=4?'Excellent work!':'Review the explanations and try again.';confetti()}
function reset(){i=score=xp=coins=combo=best=0;hearts=3;$('result').className='';$('over').className='';$('card').style.display='block';render()}
function confetti(){for(let k=0;k<70;k++){let c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=`hsl(${Math.random()*360},80%,60%)`;c.style.animationDuration=2.5+Math.random()*2+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),5000)}}
render();
</script></body></html>
